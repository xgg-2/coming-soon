
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        body {
            background-color: #008080;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: "Courier New", Courier, monospace;
        }

        .main-frame {
            background-color: #c0c0c0;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #000000;
            border-bottom: 2px solid #000000;
            width: 400px;
            padding: 2px;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.2);
        }

        .title-bar {
            background-color: #000080;
            color: #ffffff;
            padding: 4px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
        }

        .close-icon {
            background-color: #c0c0c0;
            border-top: 1px solid #ffffff;
            border-left: 1px solid #ffffff;
            border-right: 1px solid #7b7b7b;
            border-bottom: 1px solid #7b7b7b;
            width: 16px;
            height: 14px;
            color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 12px;
            font-family: sans-serif;
        }

        .close-icon:active {
            border: 1px solid #000;
            border-top-color: #7b7b7b;
            border-left-color: #7b7b7b;
        }

        .content {
            border: 1px solid #7b7b7b;
            margin: 10px;
            padding: 30px 10px;
            text-align: center;
            background-color: #c0c0c0;
        }

        h1 {
            font-size: 24px;
            margin: 0 0 15px 0;
            color: #000;
            letter-spacing: 2px;
        }

        .divider {
            height: 2px;
            background-color: #7b7b7b;
            border-bottom: 1px solid #ffffff;
            margin: 15px 0;
        }

        .message {
            font-size: 14px;
            color: #000;
            margin-bottom: 20px;
        }

        .button-zone {
            display: flex;
            justify-content: center;
            padding-bottom: 10px;
        }

        .win-button {
            background-color: #c0c0c0;
            border-top: 1px solid #ffffff;
            border-left: 1px solid #ffffff;
            border-right: 1px solid #000;
            border-bottom: 1px solid #000;
            padding: 6px 30px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            outline: 1px solid #7b7b7b;
        }

        .win-button:active {
            border: 1px solid #000;
            border-top-color: #7b7b7b;
            border-left-color: #7b7b7b;
        }

        #hidden-trigger {
            display: none;
            color: #ffffff;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="main-frame" id="box">
        <div class="title-bar">
            <span>INFORMATION</span>
            <div class="close-icon" onclick="toggle()">&#10005;</div>
        </div>
        
        <div class="content">
            <h1>COMING SOON</h1>
            <div class="divider"></div>
            <p class="message">The system is currently updating.<br>Please stand by...</p>
        </div>

        <div class="button-zone">
            <button class="win-button" onclick="toggle()">OK</button>
        </div>
    </div>

    <div id="hidden-trigger" onclick="toggle()">Show Details</div>

    <script>
        function toggle() {
            var b = document.getElementById('box');
            var t = document.getElementById('hidden-trigger');
            if (b.style.display === 'none') {
                b.style.display = 'block';
                t.style.display = 'none';
            } else {
                b.style.display = 'none';
                t.style.display = 'block';
            }
        }
    </script>
</body>
</html>
