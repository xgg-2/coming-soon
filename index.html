<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>xgg.2</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --card: #0f0f0f;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.13);
      --text: #e8e8e8;
      --sub: #555;
      --muted: #333;
      --online: #23d160;
      --idle: #f5a623;
      --dnd: #e74c3c;
      --offline: #444;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Geist', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .card.ready { opacity: 1; transform: translateY(0); }

    .nameplate-bar {
      width: 100%;
      height: 52px;
      background: #111;
      overflow: hidden;
      position: relative;
      border-bottom: 1px solid var(--border);
    }
    .nameplate-bar video,
    .nameplate-bar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .nameplate-bar.no-media {
      background: repeating-linear-gradient(
        90deg, #111 0px, #111 40px, #131313 40px, #131313 80px
      );
    }

    .avatar-row {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      padding: 0 20px;
      margin-top: -28px;
      position: relative;
      z-index: 2;
    }

    .avatar-wrap {
      position: relative;
      width: 72px;
      height: 72px;
      flex-shrink: 0;
    }
    .avatar-wrap img.av {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 3px solid var(--card);
      display: block;
      object-fit: cover;
    }
    .avatar-wrap img.deco {
      position: absolute;
      inset: -16px;
      width: calc(100% + 32px);
      height: calc(100% + 32px);
      pointer-events: none;
    }
    .status-dot {
      position: absolute;
      bottom: 3px;
      right: 3px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 3px solid var(--card);
      z-index: 3;
    }
    .status-dot.online  { background: var(--online); }
    .status-dot.idle    { background: var(--idle); }
    .status-dot.dnd     { background: var(--dnd); }
    .status-dot.offline { background: var(--offline); }

    .name-block {
      padding-bottom: 6px;
      flex: 1;
      min-width: 0;
    }
    .global-name {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .username {
      font-size: 0.75rem;
      color: var(--sub);
      margin-top: 1px;
    }

    .body { padding: 14px 20px 20px; }

    .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 9px;
      font-size: 0.7rem;
      color: var(--sub);
      white-space: nowrap;
    }
    .pill .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .pill img { width: 12px; height: 12px; border-radius: 2px; }

    .section { margin-bottom: 16px; }
    .section:last-child { margin-bottom: 0; }
    .label {
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge-btn {
      position: relative;
      background: none;
      border: none;
      padding: 0;
      cursor: default;
    }
    .badge-btn img {
      width: 22px;
      height: 22px;
      object-fit: contain;
      display: block;
      filter: grayscale(20%);
      transition: transform 0.15s ease, filter 0.15s ease;
    }
    .badge-btn:hover img { transform: scale(1.15); filter: none; }
    .badge-tooltip {
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      border: 1px solid var(--border-hover);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 0.65rem;
      color: var(--text);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 10;
    }
    .badge-btn:hover .badge-tooltip { opacity: 1; }

    .platforms { display: flex; gap: 6px; flex-wrap: wrap; }
    .platform {
      font-size: 0.7rem;
      color: var(--sub);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 8px;
    }
    .platform.active { color: var(--text); border-color: rgba(255,255,255,0.1); }

    .info-row { display: flex; gap: 8px; }
    .info-cell {
      flex: 1;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .info-cell .lbl {
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3px;
    }
    .info-cell .val {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text);
    }

    .div { height: 1px; background: var(--border); margin: 16px 0; }

    .footer {
      font-size: 0.6rem;
      color: var(--muted);
      text-align: right;
      margin-top: 14px;
      letter-spacing: 0.04em;
    }

    .loader {
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .loader span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #2a2a2a;
      animation: ld 1.1s ease-in-out infinite;
    }
    .loader span:nth-child(2) { animation-delay: .18s; }
    .loader span:nth-child(3) { animation-delay: .36s; }
    @keyframes ld {
      0%,80%,100% { opacity:.2; transform:scale(.8); }
      40% { opacity:1; transform:scale(1.1); }
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="loader"><span></span><span></span><span></span></div>
  </div>

  <script>
    const USER_ID = "1159928250148077728";
    const API = `https://lumina-api-ky2v.onrender.com/api/v1/users/${USER_ID}`;
    const STATUS_LABEL = { online:"Online", idle:"Idle", dnd:"Do Not Disturb", offline:"Offline" };

    function fmt(iso) {
      return new Date(iso).toLocaleDateString("en-US", { year:"numeric", month:"short", day:"numeric" });
    }

    async function render() {
      const card = document.getElementById("card");
      try {
        const json = await fetch(API).then(r => r.json());
        if (!json.success) throw new Error();
        const u = json.data;
        const p = u.presence;
        const st = p.status || "offline";
        const dec  = u.decorations?.avatar_decoration;
        const np   = u.decorations?.nameplate;
        const tag  = u.server_tag;
        const plat = [p.desktop&&"Desktop", p.mobile&&"Mobile", p.web&&"Web"].filter(Boolean);

        const npHTML = np?.animated_url
          ? `<video src="${np.animated_url}" autoplay loop muted playsinline></video>`
          : np?.static_url ? `<img src="${np.static_url}" alt="" />` : "";

        const badgesHTML = u.badges?.length
          ? u.badges.map(b => `
              <div class="badge-btn">
                <img src="${b.icon_url}" alt="${b.description}" />
                <div class="badge-tooltip">${b.description}</div>
              </div>`).join("")
          : `<span style="font-size:.7rem;color:#333">—</span>`;

        const platHTML = plat.length
          ? plat.map(pl => `<span class="platform active">${pl}</span>`).join("")
          : `<span class="platform">None</span>`;

        const tagHTML = tag
          ? `<span class="pill"><img src="${tag.badge_url}" />${tag.tag}</span>` : "";

        card.innerHTML = `
          <div class="nameplate-bar${np ? "" : " no-media"}">${npHTML}</div>
          <div class="avatar-row">
            <div class="avatar-wrap">
              <img class="av" src="${u.avatar}" />
              ${dec ? `<img class="deco" src="${dec.url}" />` : ""}
              <span class="status-dot ${st}"></span>
            </div>
            <div class="name-block">
              <div class="global-name">${u.global_name || u.username}</div>
              <div class="username">@${u.username}</div>
            </div>
          </div>
          <div class="body">
            <div class="meta">
              <span class="pill">
                <span class="dot" style="background:var(--${st})"></span>
                ${STATUS_LABEL[st] || st}
              </span>
              ${tagHTML}
            </div>
            ${u.badges?.length ? `
            <div class="section">
              <div class="label">Badges</div>
              <div class="badges">${badgesHTML}</div>
            </div>
            <div class="div"></div>` : ""}
            <div class="section">
              <div class="label">Active on</div>
              <div class="platforms">${platHTML}</div>
            </div>
            <div class="div"></div>
            <div class="info-row">
              <div class="info-cell">
                <div class="lbl">Created</div>
                <div class="val">${fmt(u.created_at)}</div>
              </div>
              <div class="info-cell">
                <div class="lbl">Type</div>
                <div class="val">${u.bot ? "Bot" : "User"}</div>
              </div>
            </div>
            <div class="footer">${u.id}</div>
          </div>
        `;
        requestAnimationFrame(() => card.classList.add("ready"));
      } catch {
        card.innerHTML = `<div style="padding:40px;text-align:center;color:#333;font-size:.8rem">Failed to load</div>`;
        card.classList.add("ready");
      }
    }

    render();
  </script>
</body>
</html>
