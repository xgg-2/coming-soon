<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Counter</title>
<style>
:root {
    --bg:#111;
    --fg:#eee;
}

body {
    margin:0;
    height:100vh;
    background:var(--bg);
    color:var(--fg);
    font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    touch-action:manipulation;
    user-select:none;
}

#counter {
    font-size:35vw;
    font-weight:900;
    font-variant-numeric:tabular-nums;
    letter-spacing:-0.05em;
    transition:transform 0.05s cubic-bezier(0,0,0.2,1);
    will-change:transform;
}

body:active #counter {
    transform:scale(0.96);
    opacity:0.8;
}

.overlay {
    position:fixed;
    inset:0;
    pointer-events:none;
    background:url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
    opacity:0.1;
}
</style>
</head>
<body>

<div class="overlay"></div>
<div id="counter">0</div>

<script>
let count=0;
const el=document.getElementById('counter');
let audioCtx;

const initAudio=()=>{
if(!audioCtx)audioCtx=new(AudioContext||webkitAudioContext)();
if(audioCtx.state==='suspended')audioCtx.resume();
};

const clickSound=()=>{
const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();

osc.type='square';
osc.frequency.setValueAtTime(800,audioCtx.currentTime);
osc.frequency.exponentialRampToValueAtTime(100,audioCtx.currentTime+0.02);

gain.gain.setValueAtTime(0.1,audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.02);

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.start();
osc.stop(audioCtx.currentTime+0.02);
};

window.addEventListener('pointerdown',()=>{
initAudio();
count++;
el.textContent=count;
clickSound();
});
</script>

</body>
</html>
