<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>User Data</title>
<style>
  body {
    margin: 0;
    padding: 40px 20px;
    background: #ffffff;
    color: #111111;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 14px;
  }
  .wrap {
    max-width: 480px;
    margin: 0 auto;
  }
  h1 {
    font-size: 16px;
    margin-bottom: 16px;
    border-bottom: 1px solid #000;
    padding-bottom: 6px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  td {
    border: 1px solid #999;
    padding: 6px 8px;
    vertical-align: top;
  }
  td.k {
    width: 130px;
    background: #f0f0f0;
    font-weight: bold;
  }
  img.avatar {
    width: 48px;
    height: 48px;
    vertical-align: middle;
  }
  img.badge {
    width: 16px;
    height: 16px;
    vertical-align: middle;
    margin-right: 4px;
  }
</style>
</head>
<body>
<div class="wrap">
<h1>User Data</h1>
<table id="output">
<tr><td colspan="2">Loading...</td></tr>
</table>
</div>

<script>
const USER_ID = "1159928250148077728";
const API = "https://lumina-api-ky2v.onrender.com/api/v1/users/" + USER_ID;

function fmt(iso) {
  return new Date(iso).toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
}

async function render() {
  const output = document.getElementById("output");
  try {
    const res = await fetch(API);
    const json = await res.json();
    if (!json.success) throw new Error();
    const u = json.data;
    const p = u.presence || {};
    const status = p.status || "offline";
    const platforms = [p.desktop && "Desktop", p.mobile && "Mobile", p.web && "Web"].filter(Boolean).join(", ") || "None";

    const badges = (u.badges && u.badges.length)
      ? u.badges.map(b => "<img class='badge' src='" + b.icon_url + "' title='" + b.description + "'>" + b.description).join("<br>")
      : "None";

    output.innerHTML =
      "<tr><td class='k'>Avatar</td><td><img class='avatar' src='" + u.avatar + "'></td></tr>" +
      "<tr><td class='k'>Global Name</td><td>" + (u.global_name || u.username) + "</td></tr>" +
      "<tr><td class='k'>Username</td><td>@" + u.username + "</td></tr>" +
      "<tr><td class='k'>ID</td><td>" + u.id + "</td></tr>" +
      "<tr><td class='k'>Status</td><td>" + status + "</td></tr>" +
      "<tr><td class='k'>Active On</td><td>" + platforms + "</td></tr>" +
      "<tr><td class='k'>Badges</td><td>" + badges + "</td></tr>" +
      "<tr><td class='k'>Type</td><td>" + (u.bot ? "Bot" : "User") + "</td></tr>" +
      "<tr><td class='k'>Created At</td><td>" + fmt(u.created_at) + "</td></tr>";
  } catch (e) {
    output.innerHTML = "<tr><td colspan='2'>Failed to load data</td></tr>";
  }
}

render();
</script>
</body>
</html>
