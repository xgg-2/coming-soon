<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>User Data</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%235865F2'/><circle cx='50' cy='38' r='18' fill='white'/><path d='M20 85 C20 62 34 55 50 55 C66 55 80 62 80 85 Z' fill='white'/></svg>" />
<style>
  body {
    margin: 0;
    padding: 40px 20px;
    background: #ffffff;
    color: #111111;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 14px;
  }
  .wrap {
    max-width: 560px;
    margin: 0 auto;
  }
  h1 {
    font-size: 16px;
    margin-bottom: 16px;
    border-bottom: 1px solid #000;
    padding-bottom: 6px;
  }
  h2 {
    font-size: 13px;
    margin: 20px 0 6px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  td {
    border: 1px solid #999;
    padding: 6px 8px;
    vertical-align: top;
  }
  td.k {
    width: 150px;
    background: #f0f0f0;
    font-weight: bold;
  }
  img.avatar {
    width: 48px;
    height: 48px;
    vertical-align: middle;
  }
  img.banner {
    max-width: 100%;
    height: auto;
    display: block;
  }
  img.badge {
    width: 16px;
    height: 16px;
    vertical-align: middle;
    margin-right: 4px;
  }
  img.icon {
    width: 32px;
    height: 32px;
    vertical-align: middle;
    margin-right: 4px;
  }
</style>
</head>
<body>
<div class="wrap">
<h1>User Data</h1>
<table id="output">
<tr><td colspan="2">Loading...</td></tr>
</table>
</div>

<script>
const USER_ID = "1159928250148077728";
const API = "https://lumina-api-ky2v.onrender.com/api/v1/users/" + USER_ID;

function fmt(iso) {
  return new Date(iso).toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
}

async function render() {
  const output = document.getElementById("output");
  try {
    const res = await fetch(API);
    const json = await res.json();
    if (!json.success) throw new Error();
    const u = json.data;
    const p = u.presence || {};
    const status = p.status || "offline";
    const platforms = [p.desktop && "Desktop", p.mobile && "Mobile", p.web && "Web"].filter(Boolean).join(", ") || "None";

    const dec = u.decorations || {};
    const decoration = dec.avatar_decoration
      ? "<img class='icon' src='" + dec.avatar_decoration.url + "'> SKU " + dec.avatar_decoration.sku_id
      : "None";
    const nameplate = dec.nameplate
      ? dec.nameplate.label + " (" + dec.nameplate.palette + ")"
      : "None";

    const tag = u.server_tag
      ? "<img class='icon' src='" + u.server_tag.badge_url + "'> " + u.server_tag.tag
      : "None";

    const badges = (u.badges && u.badges.length)
      ? u.badges.map(b => "<img class='badge' src='" + b.icon_url + "' title='" + b.description + "'>" + b.description).join("<br>")
      : "None";

    const activities = (p.activities && p.activities.length)
      ? p.activities.map(a => a.name + " (type " + a.type + ")").join("<br>")
      : "None";

    const spotify = p.spotify
      ? p.spotify.song + " — " + p.spotify.artist
      : "None";

    const kv = u.kv && Object.keys(u.kv).length
      ? Object.entries(u.kv).map(([k, v]) => k + ": " + v).join("<br>")
      : "Empty";

    output.innerHTML =
      "<tr><td class='k'>Banner</td><td>" + (u.banner ? "<img class='banner' src='" + u.banner + "'>" : "None") + "</td></tr>" +
      "<tr><td class='k'>Avatar</td><td><img class='avatar' src='" + u.avatar + "'></td></tr>" +
      "<tr><td class='k'>Global Name</td><td>" + (u.global_name || u.username) + "</td></tr>" +
      "<tr><td class='k'>Username</td><td>@" + u.username + "</td></tr>" +
      "<tr><td class='k'>ID</td><td>" + u.id + "</td></tr>" +
      "<tr><td class='k'>Bio</td><td>" + (u.bio || "None") + "</td></tr>" +
      "<tr><td class='k'>Pronouns</td><td>" + (u.pronouns || "None") + "</td></tr>" +
      "<tr><td class='k'>Accent Color</td><td>" + (u.accent_color != null ? "#" + u.accent_color.toString(16).padStart(6, "0") : "None") + "</td></tr>" +
      "<tr><td class='k'>Type</td><td>" + (u.bot ? "Bot" : "User") + "</td></tr>" +
      "<tr><td class='k'>Created At</td><td>" + fmt(u.created_at) + "</td></tr>" +
      "<tr><td class='k'>Server Tag</td><td>" + tag + "</td></tr>" +
      "<tr><td class='k'>Avatar Decoration</td><td>" + decoration + "</td></tr>" +
      "<tr><td class='k'>Nameplate</td><td>" + nameplate + "</td></tr>" +
      "<tr><td class='k'>Badges</td><td>" + badges + "</td></tr>" +
      "<tr><td class='k'>Status</td><td>" + status + "</td></tr>" +
      "<tr><td class='k'>Active On</td><td>" + platforms + "</td></tr>" +
      "<tr><td class='k'>Activities</td><td>" + activities + "</td></tr>" +
      "<tr><td class='k'>Spotify</td><td>" + spotify + "</td></tr>" +
      "<tr><td class='k'>KV Store</td><td>" + kv + "</td></tr>";
  } catch (e) {
    output.innerHTML = "<tr><td colspan='2'>Failed to load data</td></tr>";
  }
}

render();
</script>
</body>
</html>
