<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>xgg.2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #181818;
      --border: #222222;
      --border2: #2e2e2e;
      --text: #f0f0f0;
      --muted: #666666;
      --accent: #ffffff;
      --online: #3ba55d;
      --idle: #faa61a;
      --dnd: #ed4245;
      --offline: #747f8d;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .page-bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, #1a1a1a 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 90% 100%, #1c1c1c 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 0 1px #ffffff08, 0 40px 80px #00000080;
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .card.loaded { opacity: 1; transform: translateY(0); }

    .banner {
      height: 90px;
      background: #161616;
      position: relative;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }

    .banner::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 20px,
        #ffffff04 20px,
        #ffffff04 21px
      );
    }

    .banner-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .avatar-wrap {
      position: absolute;
      bottom: -40px;
      left: 24px;
      z-index: 10;
    }

    .avatar-ring {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      padding: 3px;
      background: var(--surface);
      position: relative;
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: block;
      object-fit: cover;
    }

    .avatar-decoration {
      position: absolute;
      inset: -14px;
      width: calc(100% + 28px);
      height: calc(100% + 28px);
      pointer-events: none;
    }

    .status-dot {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 3px solid var(--surface);
      z-index: 2;
    }

    .status-dot.online  { background: var(--online); }
    .status-dot.idle    { background: var(--idle); }
    .status-dot.dnd     { background: var(--dnd); }
    .status-dot.offline { background: var(--offline); }

    .body {
      padding: 52px 24px 24px;
    }

    .name-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 4px;
    }

    .names {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .global-name {
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1.1;
    }

    .username {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 400;
    }

    .nameplate-wrap {
      flex-shrink: 0;
      margin-top: 2px;
    }

    .nameplate-img {
      height: 28px;
      object-fit: contain;
      border-radius: 4px;
      opacity: 0.9;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 12px 0 16px;
      flex-wrap: wrap;
    }

    .tag-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 4px 8px;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    .tag-pill img {
      width: 14px;
      height: 14px;
      border-radius: 2px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .status-indicator {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-indicator.online  { background: var(--online); }
    .status-indicator.idle    { background: var(--idle); }
    .status-indicator.dnd     { background: var(--dnd); }
    .status-indicator.offline { background: var(--offline); }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .badges-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge-item {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.76rem;
      color: var(--text);
      font-weight: 500;
    }

    .badge-item img {
      width: 18px;
      height: 18px;
      object-fit: contain;
    }

    .platform-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .platform-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 5px 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--text);
    }

    .platform-tag.active {
      border-color: #ffffff22;
      color: #ffffff;
    }

    .platform-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3ba55d;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .info-cell {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 12px 14px;
    }

    .info-cell-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .info-cell-value {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      word-break: break-all;
    }

    .footer {
      margin-top: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-id {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: #333;
      letter-spacing: 0.04em;
    }

    .footer-source {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: #2a2a2a;
      letter-spacing: 0.06em;
    }

    .error-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
    }

    .loader {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
    }

    .loader-dots {
      display: flex;
      gap: 6px;
    }

    .loader-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #333;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loader-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.9); }
      40% { opacity: 1; transform: scale(1.1); }
    }

    .bio-text {
      font-size: 0.84rem;
      color: #aaa;
      line-height: 1.6;
      font-weight: 400;
    }
  </style>
</head>
<body>
  <div class="page-bg"></div>

  <div class="card" id="card">
    <div class="loader">
      <div class="loader-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <script>
    const USER_ID = "1159928250148077728";
    const API = `https://lumina-api-ky2v.onrender.com/api/v1/users/${USER_ID}`;

    const statusLabel = { online: "Online", idle: "Idle", dnd: "Do Not Disturb", offline: "Offline", invisible: "Offline" };

    function getPlatforms(presence) {
      const active = [];
      if (presence.desktop) active.push("Desktop");
      if (presence.mobile)  active.push("Mobile");
      if (presence.web)     active.push("Web");
      return active;
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
    }

    async function render() {
      const card = document.getElementById("card");

      try {
        const res  = await fetch(API);
        const json = await res.json();

        if (!json.success) throw new Error("API returned failure");

        const u = json.data;
        const p = u.presence;
        const status = p.status || "offline";
        const platforms = getPlatforms(p);
        const hasBanner = !!u.banner;
        const hasDecoration = u.decorations?.avatar_decoration;
        const hasNameplate = u.decorations?.nameplate;
        const hasServerTag = !!u.server_tag;
        const hasBio = u.bio && u.bio.trim().length > 0;

        const bannerHTML = hasBanner
          ? `<img class="banner-img" src="${u.banner}" alt="banner" />`
          : "";

        const decorHTML = hasDecoration
          ? `<img class="avatar-decoration" src="${u.decorations.avatar_decoration.url}" alt="decoration" />`
          : "";

        const nameplateHTML = hasNameplate
          ? `<div class="nameplate-wrap">
               <img class="nameplate-img" src="${u.decorations.nameplate.static_url}" alt="nameplate" title="${u.decorations.nameplate.label}" />
             </div>`
          : "";

        const serverTagHTML = hasServerTag
          ? `<span class="tag-pill">
               <img src="${u.server_tag.badge_url}" alt="tag" />
               ${u.server_tag.tag}
             </span>`
          : "";

        const platformsHTML = platforms.length > 0
          ? platforms.map(p => `<span class="platform-tag active"><span class="platform-dot"></span>${p}</span>`).join("")
          : `<span class="platform-tag">No active sessions</span>`;

        const badgesHTML = u.badges && u.badges.length > 0
          ? u.badges.map(b => `
              <div class="badge-item">
                <img src="${b.icon_url}" alt="${b.description}" />
                ${b.description}
              </div>`).join("")
          : `<span style="font-size:0.78rem;color:var(--muted);font-family:'DM Mono',monospace;">No badges</span>`;

        const bioHTML = hasBio
          ? `<div class="divider"></div>
             <div class="section-label">About Me</div>
             <p class="bio-text">${u.bio}</p>`
          : "";

        card.innerHTML = `
          <div class="banner">${bannerHTML}
            <div class="avatar-wrap">
              <div class="avatar-ring">
                <img class="avatar-img" src="${u.avatar}" alt="avatar" />
                ${decorHTML}
                <span class="status-dot ${status}"></span>
              </div>
            </div>
          </div>

          <div class="body">
            <div class="name-row">
              <div class="names">
                <span class="global-name">${u.global_name || u.username}</span>
                <span class="username">@${u.username}</span>
              </div>
              ${nameplateHTML}
            </div>

            <div class="meta-row">
              <span class="status-pill">
                <span class="status-indicator ${status}"></span>
                ${statusLabel[status] || status}
              </span>
              ${serverTagHTML}
            </div>

            ${bioHTML}

            <div class="divider"></div>

            <div class="section-label">Badges</div>
            <div class="badges-row">${badgesHTML}</div>

            <div class="divider"></div>

            <div class="section-label">Active On</div>
            <div class="platform-row">${platformsHTML}</div>

            <div class="divider"></div>

            <div class="section-label">Account Info</div>
            <div class="info-grid">
              <div class="info-cell">
                <div class="info-cell-label">Created</div>
                <div class="info-cell-value">${formatDate(u.created_at)}</div>
              </div>
              <div class="info-cell">
                <div class="info-cell-label">Account Type</div>
                <div class="info-cell-value">${u.bot ? "Bot" : "User"}</div>
              </div>
            </div>

            <div class="footer">
              <span class="footer-id">${u.id}</span>
              <span class="footer-source">lumina-api</span>
            </div>
          </div>
        `;

        requestAnimationFrame(() => card.classList.add("loaded"));

      } catch (err) {
        card.innerHTML = `<div class="error-state">Failed to load profile.<br/><br/>${err.message}</div>`;
        card.classList.add("loaded");
      }
    }

    render();
  </script>
</body>
</html>
