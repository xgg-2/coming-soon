<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Counter</title>
<style>
:root {
    --bg:#111;
    --fg:#eee;
}

body {
    margin:0;
    height:100vh;
    background:var(--bg);
    color:var(--fg);
    font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    touch-action:manipulation;
    user-select:none;
    overscroll-behavior:none;
}

#counter {
    font-size:clamp(80px, 35vw, 320px);
    font-weight:900;
    font-variant-numeric:tabular-nums;
    letter-spacing:-0.05em;
    transition:transform 0.06s cubic-bezier(0,0,0.2,1);
    will-change:transform;
    -webkit-tap-highlight-color:transparent;
}

.overlay {
    position:fixed;
    inset:0;
    pointer-events:none;
    background:url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
    opacity:0.1;
}
</style>
</head>
<body>

<div class="overlay"></div>
<div id="counter" role="button" tabindex="0" aria-label="counter">0</div>

<script>
let count = Number(localStorage.getItem('counter')) || 0;
const el = document.getElementById('counter');
el.textContent = count;

let audioCtx;
let masterGain;
let lastClick = 0;
const delay = 100;
let saveTimeout;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.4;
        masterGain.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function clickSound() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = 'square';
    osc.frequency.setValueAtTime(900, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.03);

    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);

    osc.connect(gain);
    gain.connect(masterGain);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.03);
}

function updateUI() {
    el.textContent = count;
}

function save() {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => {
        localStorage.setItem('counter', count);
    }, 150);
}

function animate() {
    el.style.transform = 'scale(0.95)';
    setTimeout(() => {
        el.style.transform = 'scale(1)';
    }, 70);
}

function handleClick() {
    count++;
    updateUI();
    save();
    animate();
    clickSound();
}

window.addEventListener('pointerdown', () => {
    const now = performance.now();
    if (now - lastClick < delay) return;
    lastClick = now;

    initAudio();
    handleClick();
});

el.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
        handleClick();
    }
});
</script>

</body>
</html>
